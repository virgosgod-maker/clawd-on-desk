<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'self'; img-src 'self' data: file:">
<title>Sessions</title>
<style>
* { box-sizing: border-box; }

:root {
  --bg: #f5f5f7;
  --surface: #ffffff;
  --surface-alt: #ececef;
  --text: #18181b;
  --muted: #6b6b70;
  --subtle: #9b9ba0;
  --border: rgba(0, 0, 0, 0.08);
  --row-border: rgba(0, 0, 0, 0.06);
  --accent: #d97757;
  --accent-hover: #c4684a;
  --running: #16803c;
  --done: #2563eb;
  --interrupted: #b45309;
  --idle: #71717a;
  --scroll-thumb: rgba(0, 0, 0, 0.15);
  --scroll-thumb-hover: rgba(0, 0, 0, 0.25);
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1f;
    --surface: #232327;
    --surface-alt: #18181b;
    --text: #f4f4f5;
    --muted: #a1a1aa;
    --subtle: #71717a;
    --border: rgba(255, 255, 255, 0.08);
    --row-border: rgba(255, 255, 255, 0.06);
    --running: #22c55e;
    --done: #60a5fa;
    --interrupted: #f59e0b;
    --idle: #a1a1aa;
    --scroll-thumb: rgba(255, 255, 255, 0.1);
    --scroll-thumb-hover: rgba(255, 255, 255, 0.2);
  }
}

html, body {
  height: 100%;
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Roboto, Helvetica, Arial, sans-serif;
  font-size: 13px;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

body { user-select: none; }

.app {
  display: flex;
  flex-direction: column;
  /* 100% (zoom-aware), not viewport units — see settings.css .app for why. */
  height: 100%;
  min-width: 0;
}

.header {
  flex: 0 0 auto;
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}

.title-row {
  display: flex;
  align-items: baseline;
  gap: 10px;
  min-width: 0;
}

h1 {
  margin: 0;
  font-size: 20px;
  line-height: 1.2;
  font-weight: 700;
  letter-spacing: 0;
}

.count {
  color: var(--muted);
  font-size: 12px;
  font-weight: 600;
}

.quota-summary {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 12px;
}

.quota-section {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.quota-section + .quota-section {
  padding-top: 10px;
  border-top: 1px solid var(--border);
}

.quota-section-header {
  font-size: 11px;
  font-weight: 700;
  color: var(--text);
}

.quota-group-row {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.quota-group-header {
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
}

.quota-halves {
  display: flex;
  gap: 14px;
}

.quota-half {
  flex: 1 1 0;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.quota-label-row {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 8px;
  font-size: 10px;
}

.quota-label {
  color: var(--muted);
}

.quota-percent {
  color: var(--subtle);
  font-variant-numeric: tabular-nums;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.quota-bar-track {
  height: 5px;
  border-radius: 3px;
  background: var(--surface-alt);
  overflow: hidden;
}

.quota-bar-fill {
  height: 100%;
  border-radius: 3px;
  background: var(--accent);
  transition: width 0.2s ease;
}

.quota-bar-fill-warning {
  background: var(--interrupted);
}

.content {
  flex: 1 1 auto;
  overflow-y: auto;
  min-height: 0;
  padding: 16px 18px 20px;
}
.content::-webkit-scrollbar { width: 6px; }
.content::-webkit-scrollbar-track { background: transparent; }
.content::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 3px; }
.content::-webkit-scrollbar-thumb:hover { background: var(--scroll-thumb-hover); }

.group {
  margin: 0 0 18px;
}

.group-title {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 0 0 8px;
  padding: 0 2px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 700;
  line-height: 1.3;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.cards {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.card {
  position: relative;
  display: grid;
  grid-template-columns: 28px minmax(0, 1fr) auto;
  gap: 10px;
  align-items: center;
  width: 100%;
  min-height: 86px;
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
}

.session-id-badge {
  position: absolute;
  top: 8px;
  right: 38px;
  font-family: ui-monospace, Menlo, Consolas, monospace;
  font-size: 11px;
  color: var(--subtle);
  pointer-events: none;
}

.agent-icon,
.agent-fallback {
  width: 28px;
  height: 28px;
  border-radius: 7px;
  flex: 0 0 auto;
}

.agent-icon {
  object-fit: contain;
  background: var(--surface-alt);
}

.agent-fallback {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: var(--surface-alt);
  color: var(--muted);
  font-weight: 700;
  font-size: 12px;
}

.main {
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.session-title {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  margin-bottom: 2px;
  font-weight: 700;
  line-height: 1.35;
  color: var(--text);
}

.session-title-input {
  width: 100%;
  min-width: 0;
  height: 22px;
  margin: -2px 0 0;
  padding: 1px 5px;
  border: 1px solid var(--accent);
  border-radius: 5px;
  outline: none;
  background: var(--surface-alt);
  color: var(--text);
  font: inherit;
  font-weight: 700;
  line-height: 1.35;
  user-select: text;
}

.meta,
.path,
.event-row,
.context-usage-row {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.45;
}

.path {
  color: var(--subtle);
}

.event-row {
  color: var(--muted);
}

.context-usage-row {
  color: var(--muted);
  font-variant-numeric: tabular-nums;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
}

.dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--idle);
}

.badge-running .dot { background: var(--running); }
.badge-done .dot { background: var(--done); }
.badge-interrupted .dot { background: var(--interrupted); }
.badge-idle .dot { background: var(--idle); }

.source-badge {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 8px;
  background: var(--surface-alt);
  color: var(--text-secondary);
  white-space: nowrap;
}
.source-badge.source-wsl {
  background: rgba(76, 166, 79, 0.15);
  color: #4ca64f;
}
.source-badge.source-ssh {
  background: rgba(66, 133, 244, 0.15);
  color: #4285f4;
}

.actions {
  display: flex;
  justify-content: flex-end;
  gap: 6px;
}

.mark-read-button {
  background: var(--surface-alt);
  color: var(--text);
  border-color: var(--border);
}

.mark-read-button:hover:not(:disabled) {
  background: var(--accent);
  color: #ffffff;
  border-color: transparent;
}

button {
  min-width: 82px;
  height: 30px;
  border: 1px solid transparent;
  border-radius: 7px;
  background: var(--accent);
  color: #ffffff;
  font: inherit;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  padding: 0 10px;
}

button:hover:not(:disabled) { background: var(--accent-hover); }
button:disabled {
  cursor: default;
  opacity: 0.45;
  background: var(--surface-alt);
  color: var(--muted);
  border-color: var(--border);
}

.hide-session-button {
  position: absolute;
  top: 5px;
  right: 8px;
  min-width: 22px;
  width: 22px;
  height: 22px;
  padding: 0;
  border-color: transparent;
  border-radius: 6px;
  background: transparent;
  color: var(--subtle);
  font-size: 17px;
  font-weight: 500;
  line-height: 20px;
}

.hide-session-button:hover:not(:disabled) {
  background: var(--surface-alt);
  color: var(--text);
}

.hide-session-button:disabled {
  background: transparent;
  color: var(--subtle);
}

.empty {
  height: 100%;
  min-height: 280px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  color: var(--muted);
  gap: 6px;
  padding: 24px;
}

.empty-title {
  color: var(--text);
  font-weight: 700;
  font-size: 15px;
}

.empty-hint {
  max-width: 260px;
  line-height: 1.45;
  color: var(--muted);
}

.hidden { display: none !important; }

@media (max-width: 420px) {
  .header { padding: 16px 16px 12px; }
  .content { padding: 12px; }
  .card {
    grid-template-columns: 28px minmax(0, 1fr);
  }
  .actions {
    grid-column: 2;
    justify-content: flex-start;
  }
}
</style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="title-row">
        <h1 id="title">Sessions</h1>
        <span id="count" class="count"></span>
      </div>
      <div id="quotaSummary" class="quota-summary" hidden></div>
    </header>
    <main id="content" class="content" aria-live="polite"></main>
  </div>
  <script src="./dashboard-renderer.js"></script>
</body>
</html>
